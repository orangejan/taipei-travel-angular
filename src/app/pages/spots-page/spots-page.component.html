<h2>景點列表</h2>

<div *ngFor="let spot of spots">
  <h3>{{ spot.name }}</h3>
  <p>{{ spot.introduction }}</p>

  <img
    *ngIf="spot.images && spot.images.length > 0"
    [src]="spot.images[0].src"
    width="200"
  />
</div>

<button (click)="currentPage = currentPage - 1; loadData()">上一頁</button>
<button (click)="currentPage = currentPage + 1; loadData()">下一頁</button>
